x-cloudwatch-logging: &cloudwatch-logging
  driver: awslogs
  options:
    awslogs-region: ${AWS_REGION:-us-east-1}
    awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/containerwatch/containers}
    awslogs-create-group: "false"
    tag: "{{.Name}}"

services:
  sample-app:
    build: ./app
    container_name: sample-app
    ports:
      - "8000:5000"
    logging: *cloudwatch-logging
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    logging: *cloudwatch-logging
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    expose:
      - "9093"
    logging: *cloudwatch-logging
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    logging: *cloudwatch-logging
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    logging: *cloudwatch-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-ChangeMe123!}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging: *cloudwatch-logging
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
