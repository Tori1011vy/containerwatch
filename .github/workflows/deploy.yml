name: Validate and Deploy

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    name: Validate configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform checks
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

      - name: Docker Compose validation
        run: docker compose config -q

      - name: Prometheus config and alert rule validation
        run: |
          docker run --rm \
            -v "$PWD/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.53.0 \
            promtool check config /etc/prometheus/prometheus.yml
          docker run --rm \
            -v "$PWD/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v2.53.0 \
            promtool check rules /etc/prometheus/alerts.yml

      - name: Alertmanager config validation
        run: |
          docker run --rm --entrypoint amtool \
            -v "$PWD/monitoring/alertmanager:/etc/alertmanager:ro" \
            prom/alertmanager:v0.27.0 \
            check-config /etc/alertmanager/alertmanager.yml

      - name: Grafana dashboard JSON validation
        run: |
          for f in monitoring/grafana/dashboards/*.json; do
            python3 -m json.tool "$f" > /dev/null
          done

  deploy:
    name: Deploy to EC2
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/containerwatch
            git pull
            docker compose up -d --build
            docker compose ps
